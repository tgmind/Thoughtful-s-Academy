<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ─────────────────────────────────────────── -->
    <title>%VITE_INSTITUTE_NAME% — Online Coaching, Live Classes & Study Material</title>
    <meta name="description" content="%VITE_INSTITUTE_NAME% — online coaching with live classes, recorded video lectures, batch-wise study material, attendance tracking and direct doubt-solving with teachers. Admissions open." />
    <link rel="canonical" href="%VITE_SITE_URL%/" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="author" content="%VITE_INSTITUTE_NAME%" />
    <meta name="theme-color" content="#111755" />

    <!-- ── Icons / PWA ─────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Open Graph (Facebook, WhatsApp, LinkedIn) ───────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="%VITE_INSTITUTE_NAME%" />
    <meta property="og:title" content="%VITE_INSTITUTE_NAME% — Online Coaching & Live Classes" />
    <meta property="og:description" content="Live classes, recorded lectures, study material and personal doubt support. Admissions open." />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_IN" />

    <!-- ── Twitter Card ────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%VITE_INSTITUTE_NAME% — Online Coaching & Live Classes" />
    <meta name="twitter:description" content="Live classes, recorded lectures, study material and personal doubt support. Admissions open." />
    <meta name="twitter:image" content="%VITE_SITE_URL%/og-image.jpg" />

    <!-- ── Structured data: EducationalOrganization ────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "EducationalOrganization",
      "name": "%VITE_INSTITUTE_NAME%",
      "description": "Online coaching institute offering live classes, recorded video lectures, batch-wise study material, attendance tracking and direct doubt-solving with teachers.",
      "url": "%VITE_SITE_URL%/",
      "logo": "%VITE_SITE_URL%/favicon.svg",
      "image": "%VITE_SITE_URL%/og-image.jpg",
      "email": "%VITE_CONTACT_EMAIL%",
      "telephone": "%VITE_CONTACT_PHONE%",
      "slogan": "%VITE_INSTITUTE_TAGLINE%",
      "areaServed": "IN"
    }
    </script>

    <!-- Google Fonts: Inter (body) + Poppins (display) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- Fallback content for crawlers/users before JS loads -->
    <noscript>
      <div style="max-width:640px;margin:40px auto;padding:0 20px;font-family:system-ui,sans-serif">
        <h1>%VITE_INSTITUTE_NAME%</h1>
        <p>%VITE_INSTITUTE_TAGLINE% — Online coaching with live classes, recorded video
        lectures, batch-wise study material, attendance tracking and direct doubt support.</p>
        <p>Please enable JavaScript to use the student portal, or
        <a href="/login">log in</a> / <a href="/register">register</a>.</p>
      </div>
    </noscript>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
